name: Publish

on:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read

env:
  CLIENT_NAME: foundry-client
  API_NAME: foundry-api

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      #
    steps:
      - uses: actions/checkout@v6

      - name: Build API image
        run: docker build . --file Dockerfile.api.production --tag $API_NAME --label "runnumber=${GITHUB_RUN_ID}"

      - name: Build client image
        run: docker build . --file Dockerfile.client.production --tag $CLIENT_NAME --label "runnumber=${GITHUB_RUN_ID}"

      - name: Log in to registry
        run: echo "${{ secrets.FOUNDRY_PUB }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        #
      - name: Push api
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/$API_NAME

          # This changes all uppercase characters to lowercase.
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          # This strips the git ref prefix from the version.
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
          # This strips the "v" prefix from the tag name.
          [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')
          # This uses the Docker `latest` tag convention.
          [ "$VERSION" == "main" ] && VERSION=latest
          echo IMAGE_ID=$IMAGE_ID
          echo VERSION=$VERSION
          docker tag $API_NAME $IMAGE_ID:$VERSION
          docker push $IMAGE_ID:$VERSION

      - name: Push client
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/$CLIENT_NAME

          # This changes all uppercase characters to lowercase.
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          # This strips the git ref prefix from the version.
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
          # This strips the "v" prefix from the tag name.
          [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')
          # This uses the Docker `latest` tag convention.
          [ "$VERSION" == "main" ] && VERSION=latest
          echo IMAGE_ID=$IMAGE_ID
          echo VERSION=$VERSION
          docker tag $CLIENT_NAME $IMAGE_ID:$VERSION
          docker push $IMAGE_ID:$VERSION
