server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Docker's embedded DNS. Resolving the API upstream through a variable (below)
  # defers name resolution to request time, so nginx still boots when the API is
  # briefly down (it restarts to run migrations) and picks up its new IP after a
  # restart instead of caching a stale one and 502-ing.
  resolver 127.0.0.11 valid=30s ipv6=off;

  # Reverse-proxy the API onto the SPA origin so the browser keeps calling
  # relative /api/v1 URLs (same-origin — no CORS/XSRF). foundryapi is the API
  # service on the shared docker network.
  location /api {
    set $api_upstream http://foundryapi:3000;
    proxy_pass $api_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Upgrade headers so the notification websocket gateway can pass through.
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # Documents served by the API's local storage driver.
  location /uploads {
    set $uploads_upstream http://foundryapi:3000;
    proxy_pass $uploads_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Long-cache immutable, hashed build assets.
  location /assets {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: every unmatched route renders the app shell (client routing).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
