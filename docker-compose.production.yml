services:
  db:
    image: postgres:18-alpine
    container_name: foundrydb
    env_file:
      - ./.env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - foundry

  redis:
    container_name: foundrycache
    image: redis
    volumes:
      - redis:/data
    restart: always
    networks:
      - foundry

  foundryapi:
    image: ghcr.io/tillertech/foundry-api:latest
    container_name: foundry-api
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      UPLOADS_DIR: /app/uploads
    env_file:
      - ./.env
    ports:
      - '3000:3000'
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    restart: always
    networks:
      - foundry

  foundryclient:
    image: ghcr.io/tillertech/foundry-client:latest
    container_name: foundry-client
    ports:
      - '4000:80'
    depends_on:
      foundryapi:
        condition: service_started
    restart: always
    networks:
      - foundry

volumes:
  postgres_data:
  redis:
  uploads:

networks:
  foundry:
    name: foundry
