services:
  db:
    image: postgres:18-alpine
    container_name: foundrydb
    environment:
      POSTGRES_HOST: 'db'
    env_file:
      - ./.env.docker
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: on-failure
    networks:
      - foundry

  redis:
    container_name: foundrycache
    image: redis
    ports:
      - '127.0.0.1:6379:6379/tcp'
    volumes:
      - redis:/data
    networks:
      - foundry
    restart: on-failure

  redis-insight:
    container_name: foundryredisinsight
    image: redis/redisinsight:latest
    ports:
      - '127.0.0.1:5540:5540'
    networks:
      - foundry
    depends_on:
      - redis
    volumes:
      - redis-insight:/data
    restart: on-failure

  mailpit:
    image: docker.io/axllent/mailpit:latest
    container_name: foundry-mailpit
    ports:
      - '1025:1025'
      - '8025:8025'
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
    volumes:
      - mailpit-data:/data
    networks:
      - foundry

  foundryapi:
    container_name: foundrydb-api
    build:
      context: .
      dockerfile: Dockerfile.api.local
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
      REDIS_HOST: foundrycache
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    env_file:
      - ./.env.docker
    ports:
      - '3000:3000'
    volumes:
      - .:/foundry
      - /foundry/node_modules
    # .nx holds nx's running-task registry (PID-keyed); sharing it with the
    # host or across restarts makes nx wait on phantom "other" processes.
    # bane of existence
    tmpfs:
      - /foundry/.nx
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    restart: on-failure
    networks:
      - foundry

  foundryclient:
    container_name: foundry-client
    build:
      context: .
      dockerfile: Dockerfile.client.local
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '4200:4200'
    volumes:
      - .:/foundry
      - /foundry/node_modules
    tmpfs:
      - /foundry/.nx
    depends_on:
      foundryapi:
        condition: service_started
    restart: on-failure
    networks:
      - foundry

  studio:
    container_name: foundry-studio
    build:
      context: .
      dockerfile: Dockerfile.api.local
    command: sh -c "npx prisma studio --config=apps/api/prisma.config.ts --port 5555 --browser none"
    env_file:
      - ./.env.docker
    ports:
      - '5555:5555'
    volumes:
      - .:/foundry
      - /foundry/node_modules
    depends_on:
      db:
        condition: service_started
    profiles:
      - tools
    networks:
      - foundry

volumes:
  postgres_data:
  redis:
  redis-insight:
  mailpit-data:

networks:
  foundry:
    name: foundry
